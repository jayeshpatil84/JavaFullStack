<div class="container">

    <mat-card>

        <mat-card-title>

            Book List

        </mat-card-title>

        <div class="toolbar">

            <button
                    mat-raised-button
                    color="primary"
                    routerLink="/books/add">

                <mat-icon>add</mat-icon>

                Add Book

            </button>

            <mat-form-field appearance="outline">

                <mat-label>Search</mat-label>

                <input
                        matInput
                        (keyup)="applyFilter($event)">

                <mat-icon matSuffix>

                    search

                </mat-icon>

            </mat-form-field>

        </div>

        <table
                mat-table
                [dataSource]="dataSource"
                matSort>

            <!-- Book Id -->

            <ng-container matColumnDef="bookId">

                <th mat-header-cell *matHeaderCellDef mat-sort-header>

                    Id

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.bookId}}

                </td>

            </ng-container>

            <!-- Book Name -->

            <ng-container matColumnDef="bookName">

                <th mat-header-cell *matHeaderCellDef>

                    Book

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.bookName}}

                </td>

            </ng-container>

            <!-- Author -->

            <ng-container matColumnDef="author">

                <th mat-header-cell *matHeaderCellDef>

                    Author

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.author}}

                </td>

            </ng-container>

            <!-- Category -->

            <ng-container matColumnDef="category">

                <th mat-header-cell *matHeaderCellDef>

                    Category

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.category}}

                </td>

            </ng-container>

            <!-- Price -->

            <ng-container matColumnDef="price">

                <th mat-header-cell *matHeaderCellDef>

                    Price

                </th>

                <td mat-cell *matCellDef="let row">

                    ₹ {{row.price}}

                </td>

            </ng-container>

            <!-- Quantity -->

            <ng-container matColumnDef="quantity">

                <th mat-header-cell *matHeaderCellDef>

                    Qty

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.quantity}}

                </td>

            </ng-container>

            <!-- Status -->

            <ng-container matColumnDef="status">

                <th mat-header-cell *matHeaderCellDef>

                    Status

                </th>

                <td mat-cell *matCellDef="let row">

                    {{row.status}}

                </td>

            </ng-container>

            <!-- Action -->

            <ng-container matColumnDef="action">

                <th mat-header-cell *matHeaderCellDef>

                    Action

                </th>

                <td mat-cell *matCellDef="let row">

                    <button
                            mat-icon-button
                            color="primary"
                            (click)="editBook(row.bookId!)">

                        <mat-icon>

                            edit

                        </mat-icon>

                    </button>

                    <button
                            mat-icon-button
                            color="warn"
                            (click)="deleteBook(row.bookId!)">

                        <mat-icon>

                            delete

                        </mat-icon>

                    </button>

                </td>

            </ng-container>

            <tr mat-header-row
                *matHeaderRowDef="displayedColumns">

            </tr>

            <tr mat-row
                *matRowDef="let row; columns: displayedColumns;">

            </tr>

        </table>

        <mat-paginator
                [pageSize]="5"
                [pageSizeOptions]="[5,10,20]">

        </mat-paginator>

    </mat-card>

</div>
