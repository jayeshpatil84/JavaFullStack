<div class="container">

  <mat-card>

    <mat-card-title>Return Book</mat-card-title>

    <table mat-table [dataSource]="issuedBooks" class="mat-elevation-z8">

      <!-- Student -->
      <ng-container matColumnDef="student">
        <th mat-header-cell *matHeaderCellDef>Student</th>
        <td mat-cell *matCellDef="let row">
          {{ row.user?.fullName }}
        </td>
      </ng-container>

      <!-- Book -->
      <ng-container matColumnDef="book">
        <th mat-header-cell *matHeaderCellDef>Book</th>
        <td mat-cell *matCellDef="let row">
          {{ row.book?.bookName }}
        </td>
      </ng-container>

      <!-- Issue Date -->
      <ng-container matColumnDef="issueDate">
        <th mat-header-cell *matHeaderCellDef>Issue Date</th>
        <td mat-cell *matCellDef="let row">
          {{ row.issueDate }}
        </td>
      </ng-container>

      <!-- Return Date -->
      <ng-container matColumnDef="returnDate">
        <th mat-header-cell *matHeaderCellDef>Return Date</th>
        <td mat-cell *matCellDef="let row">
          {{ row.returnDate }}
        </td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          {{ row.status }}
        </td>
      </ng-container>

      <!-- Action -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let row">

          <button
            mat-raised-button
            color="primary"
            (click)="returnBook(row.issueId)"
            [disabled]="row.status === 'RETURNED'">

            Return

          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </mat-card>

</div>
